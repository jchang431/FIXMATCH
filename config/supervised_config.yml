seed: 42

data:
  dataset: CIFAR
  label_pct: 0.1
  val_ratio: 0.1
  num_classes: 10
  use_randaugment: true   # if true, supervised with RandAugment

train:
  batch_size: 64
  lr: 0.001
  n_epochs: 100
  num_workers: 4

optimizer:
  type: adamw # adamw / sgd
  weight_decay: 0.0005

  # for SGD
  momentum: 0.9
  nesterov: true

  # for AdamW
  betas: [0.9, 0.999]
